name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install

      - run: pnpm run build

      - name: Build and publish macOS app
        run: pnpm exec electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist/*.dmg

      - name: Update release notes (macOS workaround)
        run: |
          VERSION="v$(node -p "require('./package.json').version")"
          REPO="${{ github.repository }}"
          sed -i '' "s|xiaoshuiz/agent-anchor|$REPO|g" .github/RELEASE_NOTES.md
          gh release edit "$VERSION" --notes-file .github/RELEASE_NOTES.md 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
